<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Lab 6</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form id="loginForm">
            <label for="user">Username</label>
            <input type="text" id="user" placeholder="James Jone" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password123" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const userName = document.getElementById("user").value;

            // Set cookie for 5 minutes
            const date = new Date();
            date.setTime(date.getTime() + (5 * 60 * 1000));
            document.cookie = "username=" + userName + "; expires=" + date.toUTCString() + "; path=/";

            window.location.href = "register.html";
        });
    </script>
</body>
</html>
